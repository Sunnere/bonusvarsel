name: Bonusvarsel collector

on:
  schedule:
    - cron: "*/30 * * * *"   # hver 30. min (kan endres senere)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: local-stable-baseline

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (none needed)
        run: echo "No deps"

      - name: Run collector
        env:
          CHANNEL: SAS
          LANGUAGE: nb
          COUNTRY: no
          PER_PAGE: "100"
        run: node scripts/collect-loyaltykey.mjs

      - name: Notify Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROGRAM: sas
          CHANNEL: SAS
          COUNTRY: no
          DISPLAY_NAME: "Trumf Netthandel"
          DATA_DIR: data
        run: |
          if [ ! -f "data/changes.json" ]; then
            echo "No changes.json – skipping notify"
            exit 0
          fi
          node scripts/notify-from-changes.mjs
